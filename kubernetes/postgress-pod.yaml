apiVersion: v1
kind: Pod
metadata:
  name: postgres-pod
  namespace: storage-lab
spec:
  containers:
  - name: postgres
    image: postgres:15
    env:
    - name: POSTGRES_PASSWORD
      value: password123
    volumeMounts:
    - mountPath: /var/lib/postgresql/data
      name: db-storage

  volumes:
  - name: db-storage
    persistentVolumeClaim:
      claimName: postgres-pvc