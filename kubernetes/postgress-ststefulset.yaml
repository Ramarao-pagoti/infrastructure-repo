apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: stateful-lab

spec:
  serviceName: postgres

  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
      - name: postgres

        image: postgres:15

        env:
        - name: POSTGRES_PASSWORD
          value: password123

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:
  - metadata:
      name: postgres-storage

    spec:
      accessModes:
      - ReadWriteOnce

      storageClassName: gp3

      resources:
        requests:
          storage: 4Gi